name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site
        env:
          GOOGLE_MAPS_EMBED_API_KEY: ${{ secrets.GOOGLE_MAPS_EMBED_API_KEY }}
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: |
          mkdir -p dist
          cp index.html styles.css .nojekyll dist/
          sed "s|__GOOGLE_MAPS_EMBED_API_KEY__|${GOOGLE_MAPS_EMBED_API_KEY}|g" app.js > dist/app.js
          python3 << 'PYEOF'
          import os
          config = os.environ['FIREBASE_CONFIG']
          with open('dist/app.js', 'r') as f:
              content = f.read()
          content = content.replace('__FIREBASE_CONFIG__', config)
          with open('dist/app.js', 'w') as f:
              f.write(content)
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
